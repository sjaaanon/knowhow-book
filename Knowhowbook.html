<!DOCTYPE html>
<!-- Knowhow Book — index -->
<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowhow Book</title>
<style>
@font-face{ font-family:'Paperlogy'; src:url('fonts/Paperlogy_7.woff2') format('woff2'); font-weight:400; font-style:normal; }
@font-face{ font-family:'Paperlogy'; src:url('fonts/Paperlogy_8.woff2') format('woff2'); font-weight:500; font-style:normal; }
@font-face{ font-family:'Paperlogy'; src:url('fonts/Paperlogy_9.woff2') format('woff2'); font-weight:700; font-style:normal; }*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --mg: 40px;
  --gap: 20px;
  --card-w: 314px;
  --card-aw: 445px;
  --card-h: 508px;
  --r: 20px;
}
@media (min-width: 2400px){
  :root{
    --mg: 54px;
    --gap: 27px;
    --card-w: 420px;
    --card-aw: 595px;
    --card-h: 680px;
    --r: 26px;
  }
}

body{
  background:#fff;
  color:#0a0a0a;
  font-family:"mundial",sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── NAV ── */
.nav{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  padding:24px var(--mg) 0;
}
.nav-logo svg{ display:block; }
.nav-right{
  text-align:right;
  font-family:'Paperlogy',sans-serif;
  font-size:13px;
  line-height:2.2;
}
.nav-active{
  display:flex; align-items:center;
  justify-content:flex-end; gap:8px;
  font-weight:700; color:#0a0a0a;
}
.nav-active::before{ content:'—'; font-weight:400; }
.nav-right a{
  text-decoration:none; color:#aaa;
  display:block; font-weight:400;
  transition:color 0.2s;
}
.nav-right a:hover{ color:#0a0a0a; }

/* ── HERO ── */
.hero{ padding:16px var(--mg) 0; text-align:center; }
.hero-title{
  font-family:"mundial",sans-serif;
  font-weight:300;
  font-size:clamp(64px, 8vw, 140px);
  letter-spacing:-0.03em;
  line-height:0.92;
  color:#0a0a0a;
  text-transform:uppercase;
}

/* ── TOOLBAR: tabs + view toggle ── */
.toolbar{
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:22px 0 24px;
}
.tabs{
  display:flex; align-items:center;
  gap:6px;
}
.tab{
  font-family:'Paperlogy',sans-serif;
  font-size:14px; font-weight:400;
  color:#aaa; cursor:pointer;
  padding:7px 20px; border-radius:30px;
  transition:all 0.2s; white-space:nowrap;
}
.tab:hover{ color:#0a0a0a; }
.tab.active{
  background:#0a0a0a; color:#fff;
  font-weight:700;
}

/* view toggle — right side */
.view-toggle{
  position:absolute;
  right:var(--mg);
  display:flex; gap:6px;
}
.vbtn{
  width:34px; height:34px;
  border:1px solid #e0e0e0;
  border-radius:8px;
  background:transparent;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:border-color 0.2s, background 0.2s;
}
.vbtn:hover{ border-color:#0a0a0a; background:#f8f8f8; }
.vbtn.active{ border-color:#0a0a0a; background:#0a0a0a; }
.vbtn.active svg path, .vbtn.active svg rect{ stroke:#fff; }

/* ── CAROUSEL STAGE ── */
.stage{
  padding:0;
  overflow:hidden;
  position:relative;
  width:100%;
}
.track{
  display:flex;
  gap:var(--gap);
  align-items:flex-end;
  padding-bottom:40px;
  width:max-content;
  transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
}

/* ── CARD ── */
.card{
  flex:0 0 auto;
  width:var(--card-w);
  height:var(--card-h);
  border-radius:var(--r);
  position:relative;
  cursor:pointer;
  overflow:hidden;
  transition:width 0.55s cubic-bezier(0.4,0,0.2,1), opacity 0.4s;
  display:flex;
  flex-direction:column;
}
.card.active{ width:var(--card-aw); }
.card.inactive{ opacity:0.5; }

/* colors */
.card[data-color="green"]  { background:#4FB87A; }
.card[data-color="orange"] { background:#E8490F; }
.card[data-color="purple"] { background:#9189A0; }
.card[data-color="yellow"] { background:#F5E83A; }
.card[data-color="black"]  { background:#111; }
.card[data-color="teal"]   { background:#2D9C8A; }
.card[data-color="navy"]   { background:#1B2A4A; }
.card[data-color="sand"]   { background:#C9B99A; }
.card[data-color="red"]    { background:#C0392B; }
.card[data-color="slate"]  { background:#4A5568; }
.card[data-color="mint"]   { background:#5DCAA5; }
.card[data-color="brown"]  { background:#7B4F2E; }

/* text colors */
.card{ color:#0a0a0a; }

/* ── DEFAULT TEXT ── */
.card-default{
  position:relative; z-index:1;
  flex:1;
  display:flex; flex-direction:column;
  padding:22px;
  transition:opacity 0.2s;
}
.card-icon{
  flex:1;
  display:flex; align-items:center; justify-content:center;
}
.card-icon svg{
  width:90px; height:90px;
}
.card-meta{
  font-family:"mundial",sans-serif;
  font-size:10px; font-weight:300;
  letter-spacing:0.18em; text-transform:uppercase;
  margin-bottom:8px; opacity:0.55;
}
.card-eng{
  font-family:"mundial",sans-serif;
  font-weight:300;
  font-size:20px;
  letter-spacing:-0.02em;
  text-transform:uppercase;
  line-height:1;
  transition:font-size 0.5s;
}
.card.active .card-eng{ font-size:26px; }
.card.inactive .card-eng{ font-size:16px; }
.card-kor{
  font-family:'Paperlogy',sans-serif;
  font-size:13px; font-weight:400;
  margin-top:4px; opacity:0.75;
  letter-spacing:0.01em;
}

/* ── OVERLAY (클릭 시 블랙) ── */
.card-overlay{
  position:absolute; inset:0;
  background:#0a0a0a; color:#fff;
  padding:22px;
  display:flex; flex-direction:column;
  justify-content:space-between;
  opacity:0; pointer-events:none;
  transition:opacity 0.35s;
  z-index:10;
  border-radius:var(--r);
}
.card.expanded .card-overlay{ opacity:1; pointer-events:all; }
.card.expanded .card-default{ opacity:0; pointer-events:none; }

.ov-top{
  display:flex; justify-content:space-between;
  align-items:flex-start;
}
.ov-badge{
  font-family:"mundial",sans-serif;
  font-size:9px; font-weight:300;
  letter-spacing:0.18em; text-transform:uppercase;
  color:rgba(255,255,255,0.35);
}
.ov-close{
  font-family:"mundial",sans-serif;
  font-size:9px; letter-spacing:0.18em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.35);
  cursor:pointer; transition:color 0.2s;
}
.ov-close:hover{ color:#fff; }

.ov-body{
  flex:1; display:flex;
  flex-direction:column; justify-content:flex-end;
}
.ov-eng{
  font-family:"mundial",sans-serif;
  font-weight:300; font-size:16px;
  letter-spacing:-0.01em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.35);
  margin-bottom:2px;
}
.ov-kor{
  font-family:'Paperlogy',sans-serif;
  font-weight:700; font-size:38px;
  line-height:1.1; letter-spacing:-0.02em;
  color:#fff; margin-bottom:14px;
}
.ov-line{
  width:28px; height:1px;
  background:rgba(255,255,255,0.2);
  margin-bottom:12px;
}
.ov-desc{
  font-family:'Paperlogy',sans-serif;
  font-size:13px; font-weight:400;
  line-height:1.85;
  color:rgba(255,255,255,0.6);
  word-break:keep-all;
}
.ov-desc strong{ color:#fff; font-weight:700; }
.ov-tags{
  display:flex; flex-wrap:wrap;
  gap:5px; margin-top:12px;
}
.ov-tag{
  font-family:"mundial",sans-serif;
  font-size:9px; letter-spacing:0.12em;
  text-transform:uppercase;
  border:1px solid rgba(255,255,255,0.18);
  padding:4px 9px; color:rgba(255,255,255,0.4);
  border-radius:3px;
}
.ov-go{
  margin-top:14px;
}
.btn-go{
  font-family:"mundial",sans-serif;
  font-size:11px; font-weight:600;
  letter-spacing:0.22em; text-transform:uppercase;
  background:#fff; color:#0a0a0a;
  border:none; border-radius:30px;
  padding:10px 24px; cursor:pointer;
  display:inline-flex; align-items:center; gap:8px;
  transition:background 0.2s, transform 0.15s;
}
.btn-go:hover{ background:#e8e8e8; transform:scale(1.03); }
.btn-go svg{ width:11px; height:11px; }

/* ── GRID VIEW ── */
.grid-stage{
  display:none;
  padding:0 var(--mg);
  padding-bottom:40px;
}
.grid-stage.visible{ display:grid; }
.grid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:var(--gap);
}
.g-card{
  border-radius:var(--r);
  aspect-ratio: 1 / 1.618;
  position:relative;
  cursor:pointer;
  overflow:hidden;
  display:flex; flex-direction:column;
  justify-content:flex-end;
  padding:18px;
  transition:transform 0.25s, opacity 0.2s;
}
.g-card:hover{ transform:scale(1.02); opacity:0.92; }
.g-card-meta{
  font-family:"mundial",sans-serif;
  font-size:9px; font-weight:300;
  letter-spacing:0.16em; text-transform:uppercase;
  margin-bottom:6px; opacity:0.55;
}
.g-card-eng{
  font-family:"mundial",sans-serif;
  font-weight:300; font-size:17px;
  text-transform:uppercase; line-height:1;
}
.g-card-kor{
  font-family:'Paperlogy',sans-serif;
  font-size:12px; font-weight:400;
  margin-top:3px; opacity:0.75;
}

/* ── ARROWS ── */
.arrows{
  display:flex; align-items:center;
  justify-content:center;
  gap:16px; padding:0 0 40px;
}
.arrow{
  width:36px; height:36px;
  border:1px solid rgba(10,10,10,0.2);
  background:transparent; color:#0a0a0a;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:14px;
  transition:border-color 0.2s, background 0.2s;
}
.arrow:hover{ border-color:#0a0a0a; background:rgba(10,10,10,0.05); }
.arrow:disabled{ opacity:0.2; cursor:default; }
.counter{
  font-family:"mundial",sans-serif;
  font-size:10px; font-weight:300;
  letter-spacing:0.18em; color:#aaa;
  min-width:52px; text-align:center;
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">
    <svg width="30" height="30" viewBox="0 0 55 55" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,0v17h51V0H0ZM0,36h34v-17H0v17ZM0,55h17v-17H0v17Z" fill="#0a0a0a" fill-rule="evenodd"></path>
    </svg>
  </div>
  <div class="nav-right">
    <div class="nav-active">노하우북</div>
    <a href="#">체크리스트</a>
    <a href="#">관리자</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1 class="hero-title">KNOWHOW BOOK</h1>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="tabs">
    <div class="tab active" data-filter="all">전체</div>
    <div class="tab" data-filter="원리">원리</div>
    <div class="tab" data-filter="구성">구성</div>
    <div class="tab" data-filter="디테일">디테일</div>
  </div>
  <!-- 뷰 전환 아이콘 -->
  <div class="view-toggle">
    <!-- 캐러셀 뷰 -->
    <button class="vbtn active" id="btnCarousel" title="캐러셀 뷰" onclick="setView(&#39;carousel&#39;)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="4" width="4" height="8" rx="1" stroke="#fff" stroke-width="1.2"></rect>
        <rect x="6" y="2" width="4" height="12" rx="1" stroke="#fff" stroke-width="1.2"></rect>
        <rect x="11" y="4" width="4" height="8" rx="1" stroke="#fff" stroke-width="1.2"></rect>
      </svg>
    </button>
    <!-- 그리드 뷰 -->
    <button class="vbtn" id="btnGrid" title="그리드 뷰" onclick="setView(&#39;grid&#39;)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="6" height="6" rx="1" stroke="#0a0a0a" stroke-width="1.2"></rect>
        <rect x="9" y="1" width="6" height="6" rx="1" stroke="#0a0a0a" stroke-width="1.2"></rect>
        <rect x="1" y="9" width="6" height="6" rx="1" stroke="#0a0a0a" stroke-width="1.2"></rect>
        <rect x="9" y="9" width="6" height="6" rx="1" stroke="#0a0a0a" stroke-width="1.2"></rect>
      </svg>
    </button>
  </div>
</div>

<!-- CAROUSEL -->
<div class="stage" id="carouselStage">
  <div class="track" id="track"></div>
</div>

<!-- GRID -->
<div class="grid-stage" id="gridStage">
  <div class="grid" id="gridEl"></div>
</div>

<!-- ARROWS (carousel only) -->
<div class="arrows" id="arrowsEl">
  <button class="arrow" id="prevBtn" disabled="">←</button>
  <span class="counter" id="counter">01 / 12</span>
  <button class="arrow" id="nextBtn">→</button>
</div>

<script>
const DATA = [
  {cat:'원리',code:'L1-01',color:'green',  eng:'Balance',    kor:'균형', icon:`<svg viewBox="0 0 72 72" stroke-width="1" stroke="currentColor" fill="none"><line x1="36" y1="6" x2="36" y2="66"/><rect x="8" y="16" width="20" height="20"/><rect x="44" y="16" width="20" height="20"/><rect x="16" y="44" width="14" height="14"/><rect x="42" y="44" width="14" height="14"/></svg>`,      kw:'대칭,비대칭,방사',      desc:'<strong>디자인 요소들의 시각적 무게감을 안정적으로 배분하는 것</strong>을 의미한다.<br><br>단순히 좌우가 같은 것이 아니라, 요소들이 서로 어떻게 균형을 이루는지, 전체 디자인 안에서 어떤 무게를 가지는지를 다룬다.<br><br>균형이 잘 맞으면 안정감이 생기고, 시각적 흐름이 자연스러워진다.'},
  {cat:'원리',code:'L1-02',color:'orange', eng:'Emphasis',   kor:'강조', icon:`<svg viewBox="0 0 72 72" stroke-width="1" stroke="currentColor" fill="none"><circle cx="36" cy="36" r="26" stroke-dasharray="5 3"/><circle cx="36" cy="36" r="10"/><line x1="36" y1="4" x2="36" y2="26"/></svg>`,      kw:'크기,색상,위치',        desc:'<strong>시선을 이끄는 핵심 요소를 부각시키는 기법</strong>을 의미한다.<br><br>크기, 색상, 위치, 대비 등 다양한 방법으로 특정 요소에 시각적 무게를 실어 중요도를 전달한다.<br><br>강조가 명확하면 위계가 생기고, 시선이 자연스럽게 핵심으로 향한다.'},
  {cat:'원리',code:'L1-03',color:'purple', eng:'Contrast',   kor:'대비', icon:`<svg viewBox="0 0 72 72" stroke-width="1" stroke="currentColor" fill="none"><rect x="4" y="4" width="28" height="64" fill="currentColor" opacity="0.15" stroke="none"/><rect x="40" y="4" width="28" height="64" fill="currentColor"/></svg>`,      kw:'명도,채도,형태',        desc:'<strong>명도, 채도, 색상, 크기의 차이를 이용해 요소를 구분</strong>하는 것. 대비는 긴장감과 다이나믹함을 부여하며, 중요한 정보와 그렇지 않은 정보를 시각적으로 분리한다.<br><br>대비가 충분하면 가독성이 높아지고 에너지가 살아난다.'},
  {cat:'원리',code:'L1-04',color:'yellow', eng:'Proportion', kor:'비율', icon:`<svg viewBox="0 0 72 72" stroke-width="1" stroke="currentColor" fill="none"><rect x="4" y="24" width="64" height="5" fill="currentColor" stroke="none"/><rect x="4" y="36" width="44" height="5" fill="currentColor" stroke="none"/><rect x="4" y="48" width="28" height="5" fill="currentColor" stroke="none"/><rect x="4" y="10" width="64" height="9" fill="currentColor" stroke="none"/></svg>`,      kw:'황금비,피보나치,스케일', desc:'<strong>디자인 요소들의 크기와 무게를 서로 비교하는 것</strong>을 의미한다.<br><br>요소들끼리 어떻게 어울리는지, 전체 디자인 안에서 어떤 비중을 차지하는지를 다룬다.<br><br>비율이 잘 맞으면 조화가 생기고 시각적 서열이 명확해진다.'},
  {cat:'원리',code:'L1-05',color:'black',  eng:'Rhythm',     kor:'리듬', icon:`<svg viewBox="0 0 72 72" stroke-width="1" stroke="currentColor" fill="none"><path d="M4 46 Q16 26 28 46 Q40 66 52 46 Q64 26 68 46"/><path d="M4 36 Q16 16 28 36 Q40 56 52 36 Q64 16 68 36" opacity="0.35"/></svg>`,      kw:'반복,패턴,흐름',        desc:'<strong>반복과 변화를 통해 시각적 흐름을 만드는 것</strong>을 의미한다.<br><br>음악의 박자처럼, 요소들이 규칙적으로 반복되거나 변화하면서 시선을 이끈다.<br><br>리듬이 살아있는 디자인은 생동감 있는 움직임이 느껴진다.'},
  {cat:'구성',code:'L2-01',color:'teal',   eng:'Angle',      kor:'앵글', icon:`<svg viewBox="0 0 72 72" stroke-width="1" stroke="currentColor" fill="none"><circle cx="36" cy="36" r="5"/><line x1="36" y1="4" x2="36" y2="31"/><line x1="36" y1="41" x2="36" y2="68"/><line x1="4" y1="36" x2="31" y2="36"/><line x1="41" y1="36" x2="68" y2="36"/><line x1="12" y1="12" x2="28" y2="28"/><line x1="44" y1="44" x2="60" y2="60"/></svg>`,      kw:'로우앵글,하이앵글,아이레벨', desc:'<strong>촬영 각도와 시점이 주는 심리적 효과</strong>를 의미한다.<br><br>로우앵글은 웅장함을, 하이앵글은 취약함을, 아이레벨은 친근함을 전달한다.'},
  {cat:'구성',code:'L2-02',color:'navy',   eng:'Lighting',   kor:'라이팅 & 쉐도우', icon:`<svg viewBox="0 0 72 72" stroke-width="1" stroke="currentColor" fill="none"><circle cx="20" cy="18" r="8"/><line x1="20" y1="18" x2="60" y2="54"/><line x1="20" y1="18" x2="68" y2="36"/><line x1="20" y1="18" x2="52" y2="68"/><circle cx="20" cy="18" r="3" fill="currentColor" stroke="none"/></svg>`, kw:'키라이트,필라이트,백라이트', desc:'<strong>빛과 그림자를 활용한 깊이감과 입체감 표현</strong>을 의미한다.<br><br>조명의 방향과 강도에 따라 피사체의 형태와 분위기가 완전히 달라진다.'},

  {cat:'구성',code:'L2-05',color:'slate',  eng:'Composition',kor:'구도', icon:`<svg viewBox="0 0 72 72" stroke-width="1" stroke="currentColor" fill="none"><rect x="4" y="4" width="64" height="64"/><line x1="4" y1="28" x2="68" y2="28"/><line x1="4" y1="44" x2="68" y2="44"/><line x1="28" y1="4" x2="28" y2="68"/><line x1="44" y1="4" x2="44" y2="68"/><circle cx="28" cy="28" r="4" fill="currentColor" stroke="none"/></svg>`,      kw:'삼분할,황금나선,시선',  desc:'<strong>피사체와 배경의 배치를 설계하는 것</strong>을 의미한다.<br><br>삼분할, 황금나선 등 구도 법칙으로 시선의 흐름을 의도적으로 설계한다.'},

  {cat:'구성',code:'L2-07',color:'brown',  eng:'Layout',     kor:'레이아웃', icon:`<svg viewBox="0 0 72 72" stroke-width="1" stroke="currentColor" fill="none"><rect x="4" y="4" width="38" height="24"/><rect x="4" y="32" width="18" height="36"/><rect x="26" y="32" width="42" height="16"/><rect x="46" y="4" width="22" height="24"/></svg>`,  kw:'배치,여백,흐름',        desc:'<strong>정보와 요소들의 공간적 배치를 설계하는 것</strong>을 의미한다.<br><br>사용자의 시선 흐름을 고려해 어떤 요소를 어디에 배치할지 결정하며, 여백의 활용도 레이아웃의 핵심이다.'},
];

const LIGHT_COLORS = ['yellow','sand'];

function makeCard(d, idx) {
  const isLight = LIGHT_COLORS.includes(d.color);
  const el = document.createElement('div');
  el.className = 'card inactive';
  el.dataset.category = d.cat;
  el.dataset.color = d.color;
  el.innerHTML = `
    <div class="card-default">
      <div class="card-icon">${d.icon}</div>
      <div class="card-text">
        <div class="card-meta">${d.cat} · ${d.code}</div>
        <div class="card-eng">${d.eng}</div>
        <div class="card-kor">${d.kor}</div>
      </div>
    </div>
    <div class="card-overlay">
      <div class="ov-top">
        <div class="ov-badge">${d.cat} · ${d.code}</div>
        <div class="ov-close">닫기 ✕</div>
      </div>
      <div class="ov-body">
        <div class="ov-eng">${d.eng}</div>
        <div class="ov-kor">${d.kor}</div>
        <div class="ov-line"></div>
        <div class="ov-desc">${d.desc}</div>
        <div class="ov-tags">${d.kw.split(',').map(k=>`<div class="ov-tag">${k.trim()}</div>`).join('')}</div>
        <div class="ov-go">
          <button class="btn-go">
            GO
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M2 6h8M6 2l4 4-4 4"/>
            </svg>
          </button>
        </div>
      </div>
    </div>`;

  el.querySelector('.ov-close').addEventListener('click', e => {
    e.stopPropagation(); el.classList.remove('expanded');
  });
  el.querySelector('.btn-go').addEventListener('click', e => {
    e.stopPropagation();
    const DETAIL_PAGES = { 'L1-01': 'balance.html' };
    if (DETAIL_PAGES[d.code]) {
      location.href = DETAIL_PAGES[d.code];
    } else {
      // 아직 준비 중인 페이지
      const btn = el.querySelector('.btn-go');
      const orig = btn.innerHTML;
      btn.textContent = '준비 중';
      btn.style.opacity = '0.5';
      btn.style.cursor = 'default';
      setTimeout(() => { btn.innerHTML = orig; btn.style.opacity=''; btn.style.cursor=''; }, 1500);
    }
  });
  return el;
}

function makeGridCard(d) {
  const isLight = LIGHT_COLORS.includes(d.color);
  const el = document.createElement('div');
  el.className = 'g-card';
  el.dataset.category = d.cat;
  el.style.background = getColor(d.color);
  el.style.color = isLight ? '#0a0a0a' : '#fff';
  el.innerHTML = `
    <div class="g-card-meta">${d.cat} · ${d.code}</div>
    <div class="g-card-eng">${d.eng}</div>
    <div class="g-card-kor">${d.kor}</div>`;
  const DETAIL_PAGES = { 'L1-01': 'balance.html' };
  el.addEventListener('click', () => {
    if (DETAIL_PAGES[d.code]) location.href = DETAIL_PAGES[d.code];
  });
  return el;
}

const COLOR_MAP = {
  green:'#4FB87A', orange:'#E8490F', purple:'#9189A0', yellow:'#F5E83A',
  black:'#111', teal:'#2D9C8A', navy:'#1B2A4A', sand:'#C9B99A',
  red:'#C0392B', slate:'#4A5568', mint:'#5DCAA5', brown:'#7B4F2E'
};
function getColor(c) { return COLOR_MAP[c] || '#ccc'; }

// build
const track = document.getElementById('track');
const gridEl = document.getElementById('gridEl');
const allCards = [];

DATA.forEach((d, i) => {
  const c = makeCard(d, i);
  track.appendChild(c);
  allCards.push(c);
  gridEl.appendChild(makeGridCard(d));
});

// carousel logic
let visibleCards = [...allCards];
let current = 0;

function getCSSVar(name) {
  return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name));
}

function calcOffset() {
  const CARD_W  = getCSSVar('--card-w');
  const CARD_AW = getCSSVar('--card-aw');
  const CARD_GAP = getCSSVar('--gap');
  const stageW = document.querySelector('.stage').offsetWidth;
  let leftOfActive = 0;
  for (let i = 0; i < current; i++) {
    leftOfActive += CARD_W + CARD_GAP;
  }
  const offset = (stageW / 2) - leftOfActive - (CARD_AW / 2);
  return offset;
}

function applyTransform(animate) {
  const track = document.getElementById('track');
  track.style.transition = animate
    ? 'transform 0.55s cubic-bezier(0.4,0,0.2,1)'
    : 'none';
  track.style.transform = 'translateX(' + calcOffset() + 'px)';
}

function render(animate) {
  visibleCards.forEach((c, i) => {
    c.classList.remove('active','inactive');
    c.classList.add(i === current ? 'active' : 'inactive');
    if (i !== current) c.classList.remove('expanded');
  });
  document.getElementById('counter').textContent =
    String(current+1).padStart(2,'0') + ' / ' + String(visibleCards.length).padStart(2,'0');
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === visibleCards.length-1;
  applyTransform(animate !== false);
}

function goTo(idx) {
  current = Math.max(0, Math.min(idx, visibleCards.length-1));
  render(true);
}

document.getElementById('prevBtn').addEventListener('click', () => goTo(current-1));
document.getElementById('nextBtn').addEventListener('click', () => goTo(current+1));

allCards.forEach(card => {
  card.addEventListener('click', () => {
    const vi = visibleCards.indexOf(card);
    if (vi === -1) return;
    if (vi !== current) { goTo(vi); return; }
    card.classList.toggle('expanded');
  });
});

// drag
let startX=0, delta=0, dragging=false;
track.addEventListener('mousedown', e => { dragging=true; startX=e.clientX; delta=0; });
window.addEventListener('mousemove', e => { if(!dragging) return; delta=e.clientX-startX; });
window.addEventListener('mouseup', () => {
  if(!dragging) return; dragging=false;
  if(Math.abs(delta)>80) goTo(delta<0?current+1:current-1);
  delta=0;
});
track.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; delta=0; }, {passive:true});
track.addEventListener('touchmove', e=>{ delta=e.touches[0].clientX-startX; }, {passive:true});
track.addEventListener('touchend', ()=>{ if(Math.abs(delta)>80) goTo(delta<0?current+1:current-1); delta=0; });

// tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const cat = tab.dataset.filter;
    allCards.forEach(c => {
      c.style.display = (cat==='all'||c.dataset.category===cat)?'':'none';
      c.classList.remove('expanded');
    });
    // grid
    document.querySelectorAll('.g-card').forEach(c => {
      c.style.display = (cat==='all'||c.dataset.category===cat)?'':'none';
    });
    visibleCards = allCards.filter(c=>c.style.display!=='none');
    current=0; render();
  });
});

// view toggle
function setView(v) {
  const cs = document.getElementById('carouselStage');
  const gs = document.getElementById('gridStage');
  const ar = document.getElementById('arrowsEl');
  const bc = document.getElementById('btnCarousel');
  const bg = document.getElementById('btnGrid');
  if(v==='carousel'){
    cs.style.display=''; gs.classList.remove('visible');
    ar.style.display='flex';
    bc.classList.add('active'); bg.classList.remove('active');
    // icon colors
    bc.querySelectorAll('rect').forEach(r=>r.setAttribute('stroke','#fff'));
    bg.querySelectorAll('rect').forEach(r=>r.setAttribute('stroke','#0a0a0a'));
  } else {
    cs.style.display='none'; gs.classList.add('visible');
    ar.style.display='none';
    bg.classList.add('active'); bc.classList.remove('active');
    bg.querySelectorAll('rect').forEach(r=>r.setAttribute('stroke','#fff'));
    bc.querySelectorAll('rect').forEach(r=>r.setAttribute('stroke','#0a0a0a'));
  }
}
window.setView = setView;

render(false);
window.addEventListener('resize', () => render(false));
</script>
